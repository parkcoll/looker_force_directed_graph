<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pending AI actions</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.4; }
  h1 { margin-bottom: 0.25rem; }
  .sub { color: #666; margin-top: 0; margin-bottom: 1.5rem; font-size: 0.9em; }
  .card { border: 1px solid #ddd; border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1rem; }
  .row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
  .tool { font-weight: 700; }
  .when { color: #888; font-size: 0.8em; }
  pre.args { background: #f6f6f6; padding: .7rem .9rem; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 0.85em; white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; margin: 0.6rem 0 1rem; }
  button { padding: .55rem 1rem; margin-right: .5rem; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 0.92em; font-weight: 600; }
  .approve { background: #2d8a3c; color: white; border-color: #2d8a3c; }
  .deny { background: #c43c3c; color: white; border-color: #c43c3c; }
  button[disabled] { opacity: .5; cursor: not-allowed; }
  .empty { color: #888; font-style: italic; padding: 2rem 0; text-align: center; }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .card { border-color: #333; }
    pre.args { background: #1c1c1c; color: #ddd; }
    .empty, .sub, .when { color: #999; }
  }
</style>
</head>
<body>
<h1>Pending AI actions</h1>
<p class="sub">Review what an AI agent is trying to do, then approve or deny it.</p>
<div id="list"><p class="empty">Loading…</p></div>
<script>
  const params = new URLSearchParams(location.search);
  const secret = params.get('secret') || '';
  const listEl = document.getElementById('list');

  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const ago = (ms) => {
    const s = Math.max(0, Math.floor((Date.now() - ms) / 1000));
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    return Math.floor(s / 3600) + 'h ago';
  };

  async function refresh() {
    const r = await fetch('/api/pending?secret=' + encodeURIComponent(secret));
    if (!r.ok) {
      listEl.innerHTML = '<p class="empty">' + (r.status === 401 ? 'Bad or missing secret in URL.' : 'Error loading.') + '</p>';
      return;
    }
    const items = await r.json();
    if (!items.length) { listEl.innerHTML = '<p class="empty">No pending actions.</p>'; return; }
    listEl.innerHTML = items.map((item) => `
      <div class="card" data-id="${esc(item.id)}">
        <div class="row">
          <span class="tool">${esc(item.tool)}</span>
          <span class="when">${esc(ago(item.created_at))}</span>
        </div>
        <pre class="args">${esc(JSON.stringify(item.args, null, 2))}</pre>
        <button class="approve" data-decision="approve">Approve</button>
        <button class="deny" data-decision="deny">Deny</button>
      </div>
    `).join('');
  }

  listEl.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-decision]');
    if (!btn) return;
    const card = btn.closest('.card');
    const id = card.dataset.id;
    card.querySelectorAll('button').forEach((b) => (b.disabled = true));
    await fetch('/api/approve/' + encodeURIComponent(id) + '?secret=' + encodeURIComponent(secret), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ decision: btn.dataset.decision }),
    });
    refresh();
  });

  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
