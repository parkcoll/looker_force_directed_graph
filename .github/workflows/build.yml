name: Build and commit forcedirected.js

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'webpack.config.js'
      - 'tsconfig.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Commit built file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forcedirected.js
          git diff --staged --quiet || git commit -m "Build: update forcedirected.js [skip ci]"
          git push
